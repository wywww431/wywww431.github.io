name: Deploy VitePress Sites

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Gateway
        run: npm run docs:build

      - name: Build Blog
        run: npm run blog:build

      - name: Build Portfolio
        run: npm run portfolio:build

      - name: Build Life
        run: npm run life:build

      - name: Build Links
        run: npm run links:build

      - name: Assemble site
        run: |
          mkdir -p output
          cp -r docs/.vitepress/dist/* output/
          mkdir -p output/blog
          cp -r docs/blog/.vitepress/dist/* output/blog/
          mkdir -p output/portfolio
          cp -r docs/portfolio/.vitepress/dist/* output/portfolio/
          mkdir -p output/life
          cp -r docs/life/.vitepress/dist/* output/life/
          mkdir -p output/links
          cp -r docs/links/.vitepress/dist/* output/links/
          # Copy shared assets to sub-sites
          cp -r docs/public/* output/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
